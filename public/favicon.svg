<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- App icon background: soft warm off-white, iOS-style rounded corners -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#F3F2EF"/>

  <!-- TOP block: narrowest -->
  <rect x="307" y="318" width="410" height="92" rx="20" ry="20" fill="#2F3437"/>

  <!-- MIDDLE block: standard width -->
  <rect x="267" y="434" width="490" height="110" rx="20" ry="20" fill="#2F3437"/>

  <!-- BOTTOM block: widest, heaviest — grounds the composition -->
  <rect x="222" y="568" width="580" height="130" rx="20" ry="20" fill="#2F3437"/>

</svg>
